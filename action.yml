name: 'GitAlchemy Action'
description: 'Generate an animated SVG wizard laboratory from your GitHub contributions'
author: 'Dasmat13'

branding:
  icon: 'award'
  color: 'red'

inputs:
  github_user_name:
    description: 'GitHub username to generate laboratory for'
    required: true
    default: ${{ github.actor }}
  github_token:
    description: 'GitHub token for API access'
    required: true
  svg_out_path:
    description: 'Output path for the animated SVG'
    required: false
    default: 'dist/alchemy.svg'

runs:
  using: 'node20'
  main: 'dist/index.js'
